#########################################################
##  Edit this file to configure the monitoring cluster ##
##  whole configuration template can be found under:   ##
##        LibreNMS-Helm/values.yaml                    ##
#########################################################

global:
  TZ: "Atlantic/Reykjavik"
  company:
    name: "Example Company"

ingress:
  # For manual TLS you can create a secret first:
  # kubectl create secret tls https-cert --cert=<certificate-file> --key=<key-file> --namespace librenms
  https: false
  className: "traefik"
  redirectToHttps:
    enabled: false
  tls:
    existingSecretName: ""
    secretName: "https-cert"
  letsEncrypt:
    enabled: false
    createIssuer: true
    email: "admin@example.domain.com"
    acmeDns:
      host: "auth.domain.com"
storage:
  path: "/data/"

application:
  host:
    FQDN: "nms.example.local"
    # volumeSize cannot be changed after initial install.
    volumeSize: "20Gi"
  lnms:
    # Installed by lnms-app container startup from this value.
    # Example for Microsoft OAuth: "socialiteproviders/microsoft"
    installPlugins: ""
  SNMPcommunity: 
    - "community-string-1"
    - "community-string-2"
  dispatcher:
    replicas: "1"
  jobsInstall:
    keepOnSuccess: false
    debug: false

# DB info should not be changed after initial install.
mariadb:
  credentials:
    rootPassword: "change-me-root-password"
    user: "librenms"
    password: "change-me-db-password"

msmtpd:
  enable: false
  host:
    name: "msmtpd"
    FQDN: "smtp.gmail.com"
    port: "587"
  from: "noreply@example.com"
  credentials:
    email:
      user: "smtp-user"
      password: "change-me-smtp-password"

smokeping:
  enable: false
  host:
    FQDN: ""

oxidized:
  enable: false
  host:
    # Use a public DNS name here if you want Oxidized covered by Let's Encrypt.
    FQDN: ""
  credentials:
    # token needs to be generated inside LibreNMS. Run "nms edit"
    # to update this information after server is running.
    token: "API-token-generated-inside-LIBRE"
    
  group:
    core:
      user: "oxidized-user"
      password: "change-me-oxidized-password"
    # Optional group examples.
    # Include non-core groups only when user, password, and string are all set.
    #G1:
    #  user: "branch-ops-user"
    #  password: "change-me-branch-password"
    #  string: "ox-group-1"
    #  var: ""

    #Telnet:
    #  user: "dc-ops-user"
    #  password: "change-me-dc-password"
    #  string: "ox-group-2"
    #  var: ""

xmatters:
  enable: false
  agent:
    enable: false
    URL: "company.xmatters.com"
    APIkey: ""
    APIsecret: ""

saml:
  enable: false
  # Supported providers: "github", "microsoft", "okta", "saml2"
  provider: ""
  # Redirect login page to first configured provider (bool)
  redirect: false
  # Allow automatic local user registration via provider (bool)
  register: false
  # Default role for authenticated users: none, normal, global-read, admin
  default_role: "global-read"
  client_id: ""
  client_secret: ""
  callback: ""  # OAuth callback URL (GitHub/Microsoft/Okta), e.g., https://nms.example.com/auth/microsoft/callback
  # GitHub: no extra provider-specific fields required
  tenant: ""  # Microsoft ONLY: tenant id/domain, e.g., common or contoso.onmicrosoft.com
  base_url: ""  # Okta ONLY: instance URL, e.g., https://dev-123456.okta.com
  # Claim field for providers that deliver roles/groups under token claims
  # Microsoft example: claim_field: "roles"
  claim_field: ""
  # Claims mapping: maps returned claim values to LibreNMS roles
  # Example: claim value "librenms-admin" -> admin role, "librenms-read" -> global-read role
  claims: {}
    # Example for Microsoft groups:
    # librenms-admin:
    #   - "admin"
    # librenms-read:
    #   - "global-read"
  saml2:
    metadata: ""  # SAML2 ONLY: IdP metadata URL or XML content
  # Provider-specific scopes
  microsoft:
    scopes:
      - "openid"
      - "profile"
      - "email"
  github:
    scopes: []
  okta:
    scopes: []
