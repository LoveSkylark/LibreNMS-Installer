#########################################################
##  Edit this file to configure the monitoring cluster ##
##  whole configuration template can be found under:   ##
##        LibreNMS-Helm/librenms/values.yaml           ##
#########################################################

global:
  TZ: "Atlantic/Reykjavik"
  company:
    name: "Example Company"

ingress:
  # For manual TLS you can create a secret first:
  # kubectl create secret tls https-cert --cert=<certificate-file> --key=<key-file> --namespace librenms
  https: false
  className: "traefik"
  redirectToHttps:
    enabled: false
  tls:
    existingSecretName: ""
    secretName: "https-cert"
  letsEncrypt:
    enabled: false
    createIssuer: false
    issuerKind: "ClusterIssuer"
    issuerName: "letsencrypt-prod"
    email: ""
    environment: "production"
    privateKeySecretName: "letsencrypt-account-key"
    server:
      production: "https://acme-v02.api.letsencrypt.org/directory"
      staging: "https://acme-staging-v02.api.letsencrypt.org/directory"

storage:
  path: "/data/"

application:
  host:
    FQDN: "nms.example.local"
    # volumeSize cannot be changed after initial install.
    volumeSize: "20Gi"
  SNMPcommunity: 
    - "community-string-1"
    - "community-string-2"
  dispatcher:
    replicas: "1"

# DB info should not be changed after initial install.
mariadb:
  credentials:
    rootPassword: "change-me-root-password"
    user: "librenms"
    password: "change-me-db-password"

msmtpd:
  enable: false
  host:
    name: "msmtpd"
    FQDN: "smtp.gmail.com"
    port: "587"
  from: "noreply@example.com"
  credentials:
    email:
      user: "smtp-user"
      password: "change-me-smtp-password"

smokeping:
  enable: false
  host:
    FQDN: "smokeping.test.local"

oxidized:
  enable: true
  host:
    FQDN: "ox.test.local"
  credentials:
    # token needs to be generated inside LibreNMS. Run "nms edit"
    # to update this information after server is running.
    token: "API-token-generated-inside-LIBRE"
    
  group:
    core:
      user: "oxidized-user"
      password: "change-me-oxidized-password"
    # Optional group examples.
    # Include non-core groups only when user, password, and string are all set.
    #G1:
    #  user: "branch-ops-user"
    #  password: "change-me-branch-password"
    #  string: "ox-group-1"
    #  var: ""

    #Telnet:
    #  user: "dc-ops-user"
    #  password: "change-me-dc-password"
    #  string: "ox-group-2"
    #  var: ""

xmatters:
  enable: false
  agent:
    enable: false
    URL: "company.xmatters.com"
    APIkey: ""
    APIsecret: ""
