TITLE Example Weathermap
HTMLOUTPUTFILE output/example.html
IMAGEOUTPUTFILE output/example.png

WIDTH 1200
HEIGHT 700
HTMLSTYLE overlib

KEYPOS DEFAULT -1 -1 Traffic Load
KEYTEXTCOLOR 0 0 0
KEYOUTLINECOLOR 0 0 0
KEYBGCOLOR 255 255 255
BGCOLOR 255 255 255
TITLECOLOR 0 0 0
TIMECOLOR 0 0 0

SCALE DEFAULT 0 0 192 192 192
SCALE DEFAULT 1 10 140 0 255
SCALE DEFAULT 10 25 32 32 255
SCALE DEFAULT 25 40 0 192 255
SCALE DEFAULT 40 55 0 240 0
SCALE DEFAULT 55 70 240 240 0
SCALE DEFAULT 70 85 255 192 0
SCALE DEFAULT 85 100 255 0 0

SET icon_dir icons

NODE DEFAULT
        LABELFONT 112
        LABELOUTLINECOLOR none
        LABELBGCOLOR none
        MAXVALUE 100

NODE Core
        LABEL Core
        POSITION 600 250

NODE EdgeA
        LABEL Edge-A
        POSITION Core -220 170

NODE EdgeB
        LABEL Edge-B
        POSITION Core 220 170

LINK Core-EdgeA
        NODES Core EdgeA
        TARGET fping:192.0.2.10
        BANDWIDTH 1G

LINK Core-EdgeB
        NODES Core EdgeB
        TARGET fping:198.51.100.10
        BANDWIDTH 1G
